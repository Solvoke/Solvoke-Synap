name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version.json on Demo station
        env:
          SSH_KEY: ${{ secrets.DEMO_SSH_PRIVATE_KEY }}
          DEMO_HOST: ${{ secrets.DEMO_HOST }}
          DEMO_PORT: ${{ secrets.DEMO_PORT }}
          DEMO_USER: ${{ secrets.DEMO_USER }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEMO_PORT" "$DEMO_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p $DEMO_PORT"
          $SSH_CMD "$DEMO_USER@$DEMO_HOST" "echo '{\"version\":\"$VERSION\",\"releaseUrl\":\"https://github.com/Solvoke/Solvoke-Synap/releases/tag/v$VERSION\"}' | sudo tee /var/www/synap/version.json > /dev/null"

      - name: Verify version.json
        run: |
          sleep 2
          curl -sf https://synapdemo.solvoke.com/version.json | jq .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
