name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feature suggestion! Please describe it below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component would this feature apply to?
      options:
        - synap-web (Dashboard)
        - synap-web (API)
        - Browser Extension (Chrome/Edge)
        - IDE Extension (VSCode/Cursor)
        - "@synap/core"
        - New Platform Support
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you'd like.
      placeholder: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature important? What problem does it solve?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions?
    validations:
      required: false
